{% load static %}
<!DOCTYPE html>
<html lang="en">
{% include 'head.html' %}
<body>
{% include 'header.html' %}
<div class="gpa-container">
    <h1>GPA Converter</h1>
    <div class="converter-card">
        <form onsubmit="conversion(event)">
            <label for="conversion_type">Conversion Type:</label>
            <select id="conversion_type" name="conversion_type">
                <option value="percent_to_all">Percentage → All</option>
                <option value="gpa12_to_gpa4">12-point → 4-point</option>
            </select>
            <div id="percentage-field">
                <label for="percentage">Percentage:</label>
                <input type="number" id="percentage" name="percentage" min="0" max="100">
            </div>
            <div id="gpa12-field">
                <label for="gpa_12">12-point GPA:</label>
                <input type="number" id="gpa_12" name="gpa_12" min="0" max="12" step="0.01">
            </div>
            <button class="gpa-btn" type="submit">Convert</button>
        </form>
        <div id="error" style="color:red;"></div>
        <div id="result"></div>
    </div>
</div>
</body>
<script src="{% static 'script.js' %}"></script>
</html>
