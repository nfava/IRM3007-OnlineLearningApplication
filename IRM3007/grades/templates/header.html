{% load static %}
<header class="top-header">
    <div class="top-header-inner">
        <div class="logo">
            <a href="{% url 'dashboard' %}">
                <img src="https://brightspace.carleton.ca/d2l/lp/navbars/6606/theme/viewimage/1312242/view?v=20.26.3.21635" alt="Carleton University">
            </a>
        </div>
        <div class="top-header-right">
            <div class="dropdown">
                <button onclick="dropDown()" class="dropbtn">
                    <div class="user-display">
                        <div class="user-badge">
                    {% if request.session.role == 'professor' %}P{% else %}S{% endif %}
                </div>
                <span class="user-name">
                    {% if request.session.role == 'professor' %}
                        Professor
                    {% else %}
                        Student
                    {% endif %}
                </span>
            </div>
        </button>

        <div id="myDropdown" class="dropdown-content">
            <form method="post" action="{% url 'switch_role' %}">
                {% csrf_token %}
                <input type="hidden" name="role" value="student">
                <button type="submit">Switch to Student</button>
            </form>

            <form method="post" action="{% url 'switch_role' %}">
                {% csrf_token %}
                <input type="hidden" name="role" value="professor">
                <button type="submit">Switch to Professor</button>
            </form>
        </div>
    </div>
</div>
    </div>
</header>
