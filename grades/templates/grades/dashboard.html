<h2>Grades Approval Dashboard</h2>

{% for grade in grades %}

<h3>{{ grade.course }}</h3>

<div class="progress-container">

    <div class="step {% if grade.status == 'submitted' %}active{% endif %}">
        Exam Submitted
        {% if grade.is_late %}
        <span class="late">(Late)</span>
        {% endif %}
    </div>

    <div class="step {% if grade.status == 'written' %}active{% endif %}">
        Exam Written
    </div>

    <div class="step {% if grade.status == 'grading' %}active{% endif %}">
        Professor Grading
    </div>

    <div class="step {% if grade.status == 'dean_review' %}active{% endif %}">
        Submitted to Dean
    </div>

    <div class="step {% if grade.status == 'approved' %}active{% endif %}">
        Approved
    </div>

    <div class="step {% if grade.status == 'released' %}active{% endif %}">
        Released
    </div>

</div>

{% end for %}
